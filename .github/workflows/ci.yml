name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    name: Typecheck · Lint · Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (errors block; warnings allowed)
        # A+ Phase 1.2 landed: lint rules were tuned so only real
        # correctness issues (rules-of-hooks) are errors. Stylistic
        # churn (no-explicit-any, no-unused-vars, exhaustive-deps,
        # React 19 strict-mode diagnostics) are warnings — visible in
        # CI logs, don't block the gate. Zero errors is the bar now.
        # Each warning is a ratchet target for incremental cleanup.
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit
        # tests/api/* need a real test DB. Run locally before PRs
        # land; CI unit covers property tests on commission math +
        # field-visibility contract + form validation for ship-gate.
