name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    name: Typecheck · Lint · Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sensitivity coverage (no leaks of @sensitivity admin fields)
        # Static gate — every reference to a kiloPerW / subDealerPerW
        # field must live in an allowlisted admin-only path. Catches new
        # code that bypasses the privacy gate before it merges. See
        # scripts/check-sensitivity-coverage.mjs for the full allowlist.
        run: npm run check:sensitivity

      - name: Schema drift (Prisma vs turso-schema.sql snapshot)
        # Compares scalar columns in prisma/schema.prisma against the
        # checked-in turso-schema.sql snapshot. Catches drift like the
        # cycle-861 repType bug. If the snapshot is stale, refresh
        # locally with `npm run snapshot:turso-schema` (needs Turso env
        # vars) before opening a schema-touching PR.
        run: npm run check:schema

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (errors block; warnings allowed)
        # A+ Phase 1.2 landed: lint rules were tuned so only real
        # correctness issues (rules-of-hooks) are errors. Stylistic
        # churn (no-explicit-any, no-unused-vars, exhaustive-deps,
        # React 19 strict-mode diagnostics) are warnings — visible in
        # CI logs, don't block the gate. Zero errors is the bar now.
        # Each warning is a ratchet target for incremental cleanup.
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit
        # tests/api/* need a real test DB. Run locally before PRs
        # land; CI unit covers property tests on commission math +
        # field-visibility contract + form validation for ship-gate.

      - name: Production build
        # Catches Next.js build errors (missing imports, server/client
        # boundary violations, JSX that only fails in prod mode) before
        # Vercel's deploy tries the same build. With Vercel's "Only
        # deploy on passing checks" setting, a failing build here blocks
        # the deploy entirely instead of letting it 500 in prod.
        env:
          # Minimal env for build-time — Prisma generate + Next compile
          # don't need real secrets, but DATABASE_URL is checked at
          # client init. File URL satisfies the parser without a real DB.
          DATABASE_URL: file:./ci-noop.db
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
          CLERK_SECRET_KEY: sk_test_dummy
        run: npm run build
