name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    name: Typecheck · Lint · Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit
        # Note: tests/api/* need a real test DB (see Phase 5 in GRADE_REPORT.md).
        # Until that's wired, CI runs unit tests only — property tests on
        # commission math + form validation + data integrity give us solid
        # financial-correctness coverage.
